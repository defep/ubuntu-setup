set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1

set -g mouse on

set -g default-terminal "screen-256color"
set -g terminal-overrides ",xterm-256color:Tc"

set -g status-style bg=colour236,fg=colour223
set -g window-status-current-style bg=colour238,fg=colour223
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39

set -g message-style bg=colour239,fg=colour223

set -g status-interval 1
set -g status-left-length 30
set -g status-right-length 50

set -g status-left "#[fg=colour232,bg=colour39] #S #[fg=colour39,bg=colour236,nobold]"
set -g status-right "#[fg=colour236,bg=colour39]#[fg=colour232,bg=colour39] %Y-%m-%d %H:%M #[fg=colour39,bg=colour236,nobold]"

setw -g window-status-format " #I: #W "
setw -g window-status-current-format " #I: #W "

set -g history-limit 10000

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
